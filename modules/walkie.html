<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 워키토키 | GOHSY 방송/배우 길드</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #D4AF37;
      --accent: #8b5cf6;
      --bg: #0a0a14;
      --card-bg: #1a1a2e;
      --text: #f5f5f5;
      --text-dim: #a0a0a0;
      --success: #22c55e;
      --danger: #ef4444;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: var(--card-bg);
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header h1 { font-size: 20px; margin-bottom: 4px; }
    .header p { font-size: 13px; color: var(--primary); }
    .container {
      flex: 1;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      width: 100%;
    }
    .instruction-box {
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid var(--primary);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .instruction-box h4 { color: var(--primary); font-size: 14px; margin-bottom: 8px; }
    .instruction-box ol { margin-left: 20px; font-size: 13px; color: var(--text-dim); }
    .instruction-box li { margin-bottom: 5px; }
    .mode-tabs {
      display: flex;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
    }
    .mode-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      color: var(--text-dim);
    }
    .mode-tab.active { background: var(--primary); color: #0a0a14; }
    .voice-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      margin-bottom: 20px;
    }
    .voice-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #0a0a14;
      font-size: 40px;
      cursor: pointer;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(212, 175, 55, 0.4);
      transition: all 0.3s;
    }
    .voice-btn.recording { animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .voice-status { font-size: 14px; color: var(--text-dim); margin-top: 15px; }
    .voice-status.recording { color: var(--danger); }
    .transcript-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .transcript-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .transcript-header h3 { font-size: 14px; color: var(--text-dim); }
    .transcript-actions { display: flex; gap: 10px; }
    .action-btn {
      background: rgba(212, 175, 55, 0.2);
      border: none;
      color: var(--primary);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .transcript-content {
      background: var(--bg);
      border-radius: 12px;
      padding: 20px;
      min-height: 150px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-wrap;
    }
    .transcript-content.empty {
      color: var(--text-dim);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .output-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .output-section h3 { font-size: 14px; color: var(--text-dim); margin-bottom: 15px; }
    .template-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .template-btn {
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      text-align: left;
      cursor: pointer;
      transition: all 0.3s;
    }
    .template-btn:hover { border-color: var(--primary); background: rgba(212, 175, 55, 0.1); }
    .template-btn h4 { font-size: 14px; margin-bottom: 4px; }
    .template-btn p { font-size: 12px; color: var(--text-dim); }
    .generated-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      display: none;
    }
    .generated-section.active { display: block; }
    .generated-content {
      background: var(--bg);
      border-radius: 12px;
      padding: 20px;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
    }
    .copy-btn {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none;
      color: #0a0a14;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 15px;
      width: 100%;
    }
    .powered-by { text-align: center; padding: 20px; font-size: 12px; color: var(--text-dim); }
    .powered-by a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <header class="header">
    <h1>AI 워키토키</h1>
    <p>말하면 글이 된다</p>
  </header>
  <main class="container">
    <div class="instruction-box">
      <h4>사용법</h4>
      <ol>
        <li>마이크 버튼을 누르고 말하세요</li>
        <li>음성이 텍스트로 변환됩니다</li>
        <li>ChatGPT에 붙여넣기 하세요</li>
        <li>생성된 글을 프로필에 올리세요</li>
      </ol>
    </div>
    <div class="mode-tabs">
      <div class="mode-tab active" data-mode="voice">음성 입력</div>
      <div class="mode-tab" data-mode="text">텍스트 입력</div>
    </div>
    <div class="voice-section" id="voiceSection">
      <p style="font-size: 14px; color: var(--text-dim); margin-bottom: 10px;">버튼을 누르고 말하세요</p>
      <button class="voice-btn" id="voiceBtn">🎤</button>
      <p class="voice-status" id="voiceStatus">대기 중</p>
    </div>
    <div class="transcript-section">
      <div class="transcript-header">
        <h3>음성 → 텍스트</h3>
        <div class="transcript-actions">
          <button class="action-btn" id="clearBtn">지우기</button>
          <button class="action-btn" id="copyRawBtn">복사</button>
        </div>
      </div>
      <div class="transcript-content empty" id="transcript">음성 인식 결과가 여기에 표시됩니다</div>
    </div>
    <div class="output-section">
      <h3>ChatGPT 프롬프트 템플릿</h3>
      <div class="template-grid">
        <button class="template-btn" data-template="profile">
          <h4>프로필 소개</h4>
          <p>배우/방송인 프로필로 변환</p>
        </button>
        <button class="template-btn" data-template="casting">
          <h4>캐스팅 의뢰</h4>
          <p>캐스팅 안내글로 변환</p>
        </button>
        <button class="template-btn" data-template="script">
          <h4>대본 연습</h4>
          <p>연기 대본으로 정리</p>
        </button>
        <button class="template-btn" data-template="review">
          <h4>작품 후기</h4>
          <p>촬영/출연 후기로 변환</p>
        </button>
      </div>
    </div>
    <div class="generated-section" id="generatedSection">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="font-size: 16px;">생성된 프롬프트</h3>
        <button class="action-btn" id="regenerateBtn">다시 생성</button>
      </div>
      <div class="generated-content" id="generatedContent"></div>
      <button class="copy-btn" id="copyPromptBtn">ChatGPT에 붙여넣기용 복사</button>
    </div>
  </main>
  <footer class="powered-by">
    Powered by <a href="https://gohsy.com">GOHSY</a> | Voices for the Voiceless
  </footer>
  <script>
    class AIWalkie {
      constructor() {
        this.recognition = null;
        this.isRecording = false;
        this.transcript = '';
        this.storageKey = 'gohsy_walkie_history';
        this.templates = {
          profile: `아래 내용을 배우/방송인 프로필 소개글로 다듬어줘. 전문적이면서도 매력적인 톤으로 작성해줘.

---
{content}
---

형식:
- 이름 / 예명
- 간략 소개 (2-3 문장)
- 주요 활동 분야
- 대표 작품/경력
- 특기/강점
- 연락 정보`,

          casting: `아래 내용을 캐스팅 모집/안내글로 변환해줘. 명확하고 전문적으로 작성해줘.

---
{content}
---

형식:
- 작품명/프로젝트
- 모집 역할
- 자격 요건
- 촬영 일정/장소
- 출연료/조건
- 지원 방법`,

          script: `아래 내용을 연기 대본 형식으로 정리해줘. 연기하기 편한 포맷으로 작성해줘.

---
{content}
---

형식:
- 장면 설명
- 등장인물
- 대사 (감정 지시 포함)
- 액션 지시
- 연기 포인트`,

          review: `아래 내용을 촬영/출연 후기 형식으로 변환해줘. 진정성 있게 작성해줘.

---
{content}
---

형식:
- 작품명/프로젝트
- 역할 소개
- 촬영 과정 이야기
- 기억에 남는 순간
- 배우고 느낀 점`
        };
        this.init();
      }
      init() {
        this.setupSpeechRecognition();
        this.bindEvents();
      }
      setupSpeechRecognition() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
          document.getElementById('voiceStatus').textContent = '음성 인식 미지원';
          document.getElementById('voiceBtn').disabled = true;
          return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        this.recognition = new SpeechRecognition();
        this.recognition.continuous = true;
        this.recognition.interimResults = true;
        this.recognition.lang = 'ko-KR';
        this.recognition.onstart = () => {
          this.isRecording = true;
          document.getElementById('voiceBtn').classList.add('recording');
          document.getElementById('voiceStatus').textContent = '듣는 중...';
          document.getElementById('voiceStatus').classList.add('recording');
        };
        this.recognition.onend = () => {
          this.isRecording = false;
          document.getElementById('voiceBtn').classList.remove('recording');
          document.getElementById('voiceStatus').textContent = '대기 중';
          document.getElementById('voiceStatus').classList.remove('recording');
        };
        this.recognition.onresult = (event) => {
          let finalTranscript = '';
          for (let i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) {
              finalTranscript += event.results[i][0].transcript;
            }
          }
          if (finalTranscript) this.transcript += finalTranscript + ' ';
          this.updateTranscript(this.transcript);
        };
      }
      updateTranscript(text) {
        const el = document.getElementById('transcript');
        if (text.trim()) {
          el.textContent = text;
          el.classList.remove('empty');
        } else {
          el.textContent = '음성 인식 결과가 여기에 표시됩니다';
          el.classList.add('empty');
        }
      }
      toggleRecording() {
        if (!this.recognition) return;
        if (this.isRecording) {
          this.recognition.stop();
        } else {
          this.transcript = '';
          this.recognition.start();
        }
      }
      generatePrompt(template) {
        const content = this.transcript.trim();
        if (!content) { alert('먼저 음성을 입력해주세요'); return; }
        const prompt = this.templates[template].replace('{content}', content);
        document.getElementById('generatedContent').textContent = prompt;
        document.getElementById('generatedSection').classList.add('active');
        document.getElementById('generatedSection').scrollIntoView({ behavior: 'smooth' });
      }
      copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
          const btn = event.target;
          const originalText = btn.textContent;
          btn.textContent = '복사됨!';
          setTimeout(() => btn.textContent = originalText, 1500);
        });
      }
      bindEvents() {
        document.getElementById('voiceBtn').addEventListener('click', () => this.toggleRecording());
        document.getElementById('clearBtn').addEventListener('click', () => {
          this.transcript = '';
          this.updateTranscript('');
          document.getElementById('generatedSection').classList.remove('active');
        });
        document.getElementById('copyRawBtn').addEventListener('click', () => this.copyToClipboard(this.transcript));
        document.querySelectorAll('.template-btn').forEach(btn => {
          btn.addEventListener('click', () => this.generatePrompt(btn.dataset.template));
        });
        document.getElementById('copyPromptBtn').addEventListener('click', () => {
          this.copyToClipboard(document.getElementById('generatedContent').textContent);
        });
        document.querySelectorAll('.mode-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const voiceSection = document.getElementById('voiceSection');
            if (tab.dataset.mode === 'text') {
              voiceSection.innerHTML = `<textarea id="textInput" placeholder="여기에 직접 입력하세요..." style="width: 100%; min-height: 150px; background: var(--bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; color: var(--text); font-size: 15px; resize: vertical;"></textarea>`;
              document.getElementById('textInput').addEventListener('input', (e) => {
                this.transcript = e.target.value;
                this.updateTranscript(this.transcript);
              });
            } else {
              voiceSection.innerHTML = `<p style="font-size: 14px; color: var(--text-dim); margin-bottom: 10px;">버튼을 누르고 말하세요</p><button class="voice-btn" id="voiceBtn">🎤</button><p class="voice-status" id="voiceStatus">대기 중</p>`;
              document.getElementById('voiceBtn').addEventListener('click', () => this.toggleRecording());
            }
          });
        });
      }
    }
    document.addEventListener('DOMContentLoaded', () => new AIWalkie());
  </script>
</body>
</html>
