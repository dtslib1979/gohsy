<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOHSYNE | GOHSY GROUP</title>
  <meta name="description" content="GOHSYNE - 하루를 설명하는 언어. 세계를 정리해서 건네는 채널.">
  <link rel="icon" href="../assets/icons/logo.jpg">
  <style>
    :root {
      --bg: #0F1F15;
      --bg-elevated: #1A2E22;
      --bg-card: #243529;
      --accent: #4ECDC4;
      --gold: #D4AF37;
      --text: #F5F5F0;
      --text-secondary: rgba(245,245,240,.7);
      --text-muted: rgba(245,245,240,.5);
      --border: rgba(245,245,240,.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
      padding-bottom: 100px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 24px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
      background: var(--bg-elevated);
      border: 1px solid var(--accent);
      border-radius: 20px;
      margin-bottom: 24px;
    }

    .hero-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      overflow: hidden;
      background: var(--bg-card);
    }

    .hero-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .hero-tagline {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 8px;
      font-style: italic;
    }

    .hero-role {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(78, 205, 196, 0.2);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .section {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section-content {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .section-content p {
      margin-bottom: 12px;
    }

    .section-content p:last-child {
      margin-bottom: 0;
    }

    .identity-grid {
      display: grid;
      gap: 10px;
    }

    .identity-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: var(--bg-card);
      border-radius: 10px;
    }

    .identity-icon {
      font-size: 20px;
    }

    .identity-text {
      font-size: 14px;
      color: var(--text);
    }

    .rule-box {
      background: rgba(78, 205, 196, 0.1);
      border: 1px solid rgba(78, 205, 196, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin-top: 12px;
    }

    .rule-title {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .rule-list {
      font-size: 13px;
      color: var(--text-muted);
    }

    .rule-list span {
      display: block;
      margin-bottom: 4px;
    }

    .quote-box {
      text-align: center;
      padding: 20px;
      background: var(--bg-card);
      border-left: 3px solid var(--accent);
      border-radius: 0 12px 12px 0;
      margin-top: 16px;
    }

    .quote-text {
      font-size: 15px;
      color: var(--text);
      font-style: italic;
    }

    .channel-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .channel-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../" class="back-link">← GOHSY GROUP</a>

    <div class="hero">
      <div class="hero-icon">
        <img src="../assets/affiliates/gohsyne.jpg" alt="GOHSYNE" onerror="this.parentElement.innerHTML='🔵'">
      </div>
      <h1 class="hero-title">GOHSYNE</h1>
      <p class="hero-tagline">"하루를 설명하는 언어"</p>
      <p class="hero-role">Explanation · 생활 · 교육</p>
      <span class="hero-badge">세계를 정리해서 건네는 채널</span>
    </div>

    <div class="section">
      <h2 class="section-title">Identity</h2>
      <div class="identity-grid">
        <div class="identity-item">
          <span class="identity-icon">🌤</span>
          <span class="identity-text">생활 리듬</span>
        </div>
        <div class="identity-item">
          <span class="identity-icon">📝</span>
          <span class="identity-text">날씨, 일상, 언어</span>
        </div>
        <div class="identity-item">
          <span class="identity-icon">🎯</span>
          <span class="identity-text">설명자 포지션</span>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 class="section-title">Content Tone</h2>
      <div class="section-content">
        <p><strong>차분</strong> · 명확 · 안정</p>
        <p>감정 과잉 없이, 드라마화 없이, 사연 중심 없이.</p>
      </div>

      <div class="rule-box">
        <div class="rule-title">금지 사항</div>
        <div class="rule-list">
          <span>❌ 감정 과잉</span>
          <span>❌ 사연 중심</span>
          <span>❌ 드라마화</span>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 class="section-title">Role</h2>
      <div class="section-content">
        <p>GOHSYNE는 세계를 정리해서 건넨다.</p>
        <p>설명 → 신뢰 → 구매 전환. 그룹 내 전환 담당.</p>
      </div>

      <div class="quote-box">
        <p class="quote-text">"하루를 설명하는 언어"</p>
      </div>
    </div>

    <a href="#" class="channel-btn">채널 준비 중</a>
  </div>
</body>
</html>
