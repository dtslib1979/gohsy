<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathQ | GOHSY Affiliate</title>
  <meta name="description" content="MathQ - 중고등 수학 전문 과외. 개념부터 심화까지.">
  <link rel="icon" href="../assets/icons/logo.jpg">
  <style>
    :root {
      --bg: #0F1F15;
      --bg-elevated: #1A2E22;
      --bg-card: #243529;
      --accent: #4ECDC4;
      --gold: #D4AF37;
      --text: #F5F5F0;
      --text-secondary: rgba(245,245,240,.7);
      --text-muted: rgba(245,245,240,.5);
      --border: rgba(245,245,240,.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
      padding-bottom: 100px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 24px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
      background: var(--bg-elevated);
      border: 1px solid var(--accent);
      border-radius: 20px;
      margin-bottom: 24px;
    }

    .hero-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .hero-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .hero-role {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(78, 205, 196, 0.2);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .section {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .section-content {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .video-grid {
      display: grid;
      gap: 12px;
    }

    .video-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s;
    }

    .video-item:hover {
      border-color: var(--accent);
    }

    .video-icon {
      font-size: 24px;
    }

    .video-info {
      flex: 1;
    }

    .video-title {
      font-size: 14px;
      font-weight: 600;
    }

    .video-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    .video-arrow {
      color: var(--accent);
    }

    .contact-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .contact-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../" class="back-link">← GOHSY</a>

    <div class="hero">
      <div class="hero-icon">📐</div>
      <h1 class="hero-title">MathQ</h1>
      <p class="hero-role">수학 과외 · Wife</p>
      <span class="hero-badge">Education</span>
    </div>

    <div class="section">
      <h2 class="section-title">About</h2>
      <p class="section-content">
        중고등 수학 전문 과외입니다. 개념부터 심화까지, 학생 개인의 수준에 맞춘 1:1 맞춤 수업을 진행합니다.
        수학적 사고력 향상과 문제 해결 능력 배양에 중점을 둡니다.
      </p>
    </div>

    <div class="section">
      <h2 class="section-title">Videos</h2>
      <div class="video-grid">
        <a href="#" class="video-item">
          <span class="video-icon">▶️</span>
          <div class="video-info">
            <div class="video-title">수학 공부법</div>
            <div class="video-desc">효과적인 수학 학습 방법</div>
          </div>
          <span class="video-arrow">→</span>
        </a>
        <a href="#" class="video-item">
          <span class="video-icon">▶️</span>
          <div class="video-info">
            <div class="video-title">개념 정리</div>
            <div class="video-desc">핵심 개념 완벽 정리</div>
          </div>
          <span class="video-arrow">→</span>
        </a>
      </div>
    </div>

    <a href="mailto:mathq@gohsy.com" class="contact-btn">문의하기</a>
  </div>
</body>
</html>
