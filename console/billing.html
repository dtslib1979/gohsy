<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정산 관리 | GOHSY 콘솔</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #D4AF37;
      --accent: #22c55e;
      --bg: #0a0a14;
      --card-bg: #1a1a2e;
      --text: #f5f5f5;
      --text-dim: #a0a0a0;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: var(--card-bg);
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .header-content {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 20px;
    }

    .back-btn {
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .revenue-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .revenue-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 25px;
      text-align: center;
    }

    .revenue-card.highlight {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(34, 197, 94, 0.2));
      border: 1px solid var(--primary);
    }

    .revenue-label {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .revenue-value {
      font-size: 28px;
      font-weight: 700;
    }

    .revenue-sub {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 5px;
    }

    .section {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 16px;
    }

    .section-action {
      background: var(--primary);
      border: none;
      color: #0a0a14;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }

    .billing-table {
      width: 100%;
      border-collapse: collapse;
    }

    .billing-table th,
    .billing-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .billing-table th {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 500;
    }

    .billing-table td {
      font-size: 14px;
    }

    .billing-table tr:hover {
      background: rgba(255,255,255,0.02);
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .status-badge.paid {
      background: rgba(34, 197, 94, 0.2);
      color: var(--success);
    }

    .status-badge.pending {
      background: rgba(245, 158, 11, 0.2);
      color: var(--warning);
    }

    .status-badge.overdue {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    .breakdown {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 600px) {
      .breakdown {
        grid-template-columns: 1fr;
      }
    }

    .breakdown-section h4 {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 15px;
    }

    .breakdown-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .breakdown-item:last-child {
      border-bottom: none;
      font-weight: 600;
      padding-top: 15px;
      margin-top: 5px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .breakdown-label {
      color: var(--text-dim);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--card-bg);
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      padding: 25px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 24px;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-dim);
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none;
      border-radius: 8px;
      color: #0a0a14;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1>💰 정산 관리</h1>
      <a href="index.html" class="back-btn">← 콘솔</a>
    </div>
  </header>

  <main class="container">
    <div class="revenue-summary">
      <div class="revenue-card highlight">
        <div class="revenue-label">이번 달 예상 수익</div>
        <div class="revenue-value" id="totalRevenue">₩0</div>
        <div class="revenue-sub">고정 + 변동</div>
      </div>
      <div class="revenue-card">
        <div class="revenue-label">고정 수익 (월 이용료)</div>
        <div class="revenue-value" id="fixedRevenue">₩0</div>
        <div class="revenue-sub" id="fixedCount">0명 × 7만</div>
      </div>
      <div class="revenue-card">
        <div class="revenue-label">변동 수익 (PR)</div>
        <div class="revenue-value" id="variableRevenue">₩0</div>
        <div class="revenue-sub" id="variableCount">0건</div>
      </div>
      <div class="revenue-card">
        <div class="revenue-label">미수금</div>
        <div class="revenue-value" style="color: var(--danger)" id="pendingAmount">₩0</div>
        <div class="revenue-sub" id="pendingCount">0건</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <h2 class="section-title">📊 수익 상세</h2>
      </div>
      <div class="breakdown">
        <div class="breakdown-section">
          <h4>고정 수익</h4>
          <div id="fixedBreakdown">
            <div class="breakdown-item">
              <span class="breakdown-label">유료 슬롯</span>
              <span>0명 × ₩70,000</span>
            </div>
            <div class="breakdown-item">
              <span>소계</span>
              <span>₩0</span>
            </div>
          </div>
        </div>
        <div class="breakdown-section">
          <h4>변동 수익</h4>
          <div id="variableBreakdown">
            <div class="breakdown-item">
              <span class="breakdown-label">완료된 PR 없음</span>
              <span>-</span>
            </div>
            <div class="breakdown-item">
              <span>소계</span>
              <span>₩0</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <h2 class="section-title">👥 멤버별 정산</h2>
        <button class="section-action" id="addMemberBtn">+ 멤버 추가</button>
      </div>
      <table class="billing-table">
        <thead>
          <tr>
            <th>슬롯</th>
            <th>이름</th>
            <th>유형</th>
            <th>월 이용료</th>
            <th>상태</th>
            <th>다음 결제일</th>
          </tr>
        </thead>
        <tbody id="memberList"></tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-header">
        <h2 class="section-title">📋 PR 정산</h2>
      </div>
      <table class="billing-table">
        <thead>
          <tr>
            <th>요청 ID</th>
            <th>슬롯</th>
            <th>유형</th>
            <th>금액</th>
            <th>상태</th>
            <th>완료일</th>
          </tr>
        </thead>
        <tbody id="prBillingList"></tbody>
      </table>
    </div>
  </main>

  <div class="modal" id="addMemberModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>멤버 추가</h3>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <form id="memberForm">
        <div class="form-group">
          <label>슬롯</label>
          <select name="slot" id="slotSelect"></select>
        </div>
        <div class="form-group">
          <label>이름</label>
          <input type="text" name="name" placeholder="멤버 이름" required>
        </div>
        <div class="form-group">
          <label>연락처</label>
          <input type="text" name="contact" placeholder="전화번호 또는 카톡 ID">
        </div>
        <div class="form-group">
          <label>시작일</label>
          <input type="date" name="startDate" required>
        </div>
        <button type="submit" class="submit-btn">추가</button>
      </form>
    </div>
  </div>

  <script>
    class BillingManager {
      constructor() {
        this.slotsKey = 'gohsy_slots';
        this.prKey = 'gohsy_pr_requests';
        this.billingKey = 'gohsy_billing';

        this.slots = this.loadSlots();
        this.prRequests = this.loadPR();
        this.pricing = {
          monthly: 70000,
          pwa: 50000,
          edit: 10000,
          content: 30000,
          design: 20000,
          lesson: 15000
        };

        this.init();
      }

      init() {
        this.calculateRevenue();
        this.renderMembers();
        this.renderPRBilling();
        this.bindEvents();
      }

      loadSlots() {
        const stored = localStorage.getItem(this.slotsKey);
        if (stored) return JSON.parse(stored);

        return [
          { id: 'slot01', name: '길드장', owner: '길드장', type: 'anchor', status: 'active', contact: '', startDate: '2026-02-06', paymentStatus: 'paid' },
          { id: 'slot02', name: '슬롯 02', owner: null, type: 'paid', status: 'empty' },
          { id: 'slot03', name: '슬롯 03', owner: null, type: 'paid', status: 'empty' },
          { id: 'slot04', name: '슬롯 04', owner: null, type: 'paid', status: 'empty' },
          { id: 'slot05', name: '슬롯 05', owner: null, type: 'paid', status: 'empty' },
          { id: 'slot06', name: '슬롯 06', owner: null, type: 'paid', status: 'empty' },
          { id: 'slot07', name: '슬롯 07', owner: null, type: 'paid', status: 'empty' },
          { id: 'slot08', name: '슬롯 08', owner: null, type: 'paid', status: 'empty' },
          { id: 'slot09', name: '슬롯 09', owner: null, type: 'paid', status: 'empty' },
          { id: 'slot10', name: '슬롯 10', owner: null, type: 'paid', status: 'empty' },
          { id: 'slot11', name: '슬롯 11', owner: null, type: 'paid', status: 'empty' },
          { id: 'slot12', name: '슬롯 12', owner: null, type: 'paid', status: 'empty' }
        ];
      }

      saveSlots() {
        localStorage.setItem(this.slotsKey, JSON.stringify(this.slots));
      }

      loadPR() {
        const stored = localStorage.getItem(this.prKey);
        return stored ? JSON.parse(stored) : [];
      }

      calculateRevenue() {
        const paidActive = this.slots.filter(s => s.type === 'paid' && s.status === 'active');
        const fixedRevenue = paidActive.length * this.pricing.monthly;

        const completedPR = this.prRequests.filter(r => r.status === 'completed');
        const variableRevenue = completedPR.reduce((sum, r) => {
          return sum + (this.pricing[r.type] || 0);
        }, 0);

        const pendingPR = this.prRequests.filter(r => r.status === 'pending');
        const pendingAmount = pendingPR.reduce((sum, r) => {
          return sum + (this.pricing[r.type] || 0);
        }, 0);

        document.getElementById('totalRevenue').textContent = `₩${(fixedRevenue + variableRevenue).toLocaleString()}`;
        document.getElementById('fixedRevenue').textContent = `₩${fixedRevenue.toLocaleString()}`;
        document.getElementById('fixedCount').textContent = `${paidActive.length}명 × 7만`;
        document.getElementById('variableRevenue').textContent = `₩${variableRevenue.toLocaleString()}`;
        document.getElementById('variableCount').textContent = `${completedPR.length}건`;
        document.getElementById('pendingAmount').textContent = `₩${pendingAmount.toLocaleString()}`;
        document.getElementById('pendingCount').textContent = `${pendingPR.length}건`;

        this.renderBreakdown(paidActive, completedPR, fixedRevenue, variableRevenue);
      }

      renderBreakdown(paidActive, completedPR, fixedRevenue, variableRevenue) {
        document.getElementById('fixedBreakdown').innerHTML = `
          <div class="breakdown-item">
            <span class="breakdown-label">유료 슬롯</span>
            <span>${paidActive.length}명 × ₩70,000</span>
          </div>
          <div class="breakdown-item">
            <span>소계</span>
            <span>₩${fixedRevenue.toLocaleString()}</span>
          </div>
        `;

        const prByType = {};
        completedPR.forEach(r => {
          prByType[r.type] = (prByType[r.type] || 0) + 1;
        });

        const typeNames = {
          pwa: 'PWA/APK 제작',
          edit: '페이지 수정',
          content: '콘텐츠 제작',
          design: '디자인 변경',
          lesson: '수업 자료'
        };

        let variableHTML = '';
        Object.entries(prByType).forEach(([type, count]) => {
          const price = this.pricing[type] || 0;
          variableHTML += `
            <div class="breakdown-item">
              <span class="breakdown-label">${typeNames[type] || type}</span>
              <span>${count}건 × ₩${price.toLocaleString()}</span>
            </div>
          `;
        });

        if (!variableHTML) {
          variableHTML = '<div class="breakdown-item"><span class="breakdown-label">완료된 PR 없음</span><span>-</span></div>';
        }

        variableHTML += `
          <div class="breakdown-item">
            <span>소계</span>
            <span>₩${variableRevenue.toLocaleString()}</span>
          </div>
        `;

        document.getElementById('variableBreakdown').innerHTML = variableHTML;
      }

      renderMembers() {
        const tbody = document.getElementById('memberList');
        const activeSlots = this.slots.filter(s => s.status === 'active');

        if (activeSlots.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-dim);">등록된 멤버가 없습니다</td></tr>';
          return;
        }

        tbody.innerHTML = activeSlots.map(slot => {
          const nextPayment = this.getNextPaymentDate(slot.startDate);
          return `
            <tr>
              <td>${slot.id}</td>
              <td>${slot.owner || '-'}</td>
              <td>${slot.type === 'anchor' ? '앵커' : '유료'}</td>
              <td>${slot.type === 'anchor' ? '-' : '₩70,000'}</td>
              <td><span class="status-badge ${slot.paymentStatus || 'pending'}">${this.getPaymentStatusLabel(slot.paymentStatus)}</span></td>
              <td>${slot.type === 'anchor' ? '-' : nextPayment}</td>
            </tr>
          `;
        }).join('');
      }

      getNextPaymentDate(startDate) {
        if (!startDate) return '-';
        const start = new Date(startDate);
        const now = new Date();
        const next = new Date(start);

        while (next <= now) {
          next.setMonth(next.getMonth() + 1);
        }

        return `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,'0')}-${String(next.getDate()).padStart(2,'0')}`;
      }

      getPaymentStatusLabel(status) {
        const labels = {
          paid: '완료',
          pending: '대기',
          overdue: '연체'
        };
        return labels[status] || '대기';
      }

      renderPRBilling() {
        const tbody = document.getElementById('prBillingList');
        const completedPR = this.prRequests.filter(r => r.status === 'completed');

        if (completedPR.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-dim);">완료된 PR이 없습니다</td></tr>';
          return;
        }

        const typeNames = {
          pwa: 'PWA/APK',
          edit: '페이지 수정',
          content: '콘텐츠',
          design: '디자인',
          lesson: '수업 자료',
          custom: '기타'
        };

        tbody.innerHTML = completedPR.map(pr => {
          const price = this.pricing[pr.type] || 0;
          const date = pr.updatedAt ? new Date(pr.updatedAt).toLocaleDateString('ko-KR') : '-';
          return `
            <tr>
              <td style="font-family: monospace;">#${pr.id}</td>
              <td>${pr.slot}</td>
              <td>${typeNames[pr.type] || pr.type}</td>
              <td>₩${price.toLocaleString()}</td>
              <td><span class="status-badge paid">완료</span></td>
              <td>${date}</td>
            </tr>
          `;
        }).join('');
      }

      bindEvents() {
        document.getElementById('addMemberBtn').addEventListener('click', () => {
          this.populateSlotSelect();
          document.getElementById('addMemberModal').classList.add('active');
        });

        document.getElementById('closeModal').addEventListener('click', () => {
          document.getElementById('addMemberModal').classList.remove('active');
        });

        document.getElementById('memberForm').addEventListener('submit', (e) => {
          e.preventDefault();
          this.addMember(new FormData(e.target));
          e.target.reset();
          document.getElementById('addMemberModal').classList.remove('active');
        });
      }

      populateSlotSelect() {
        const select = document.getElementById('slotSelect');
        const emptySlots = this.slots.filter(s => s.status === 'empty');

        select.innerHTML = emptySlots.map(s => `
          <option value="${s.id}">${s.id}</option>
        `).join('');

        if (emptySlots.length === 0) {
          select.innerHTML = '<option disabled>빈 슬롯이 없습니다</option>';
        }
      }

      addMember(formData) {
        const slotId = formData.get('slot');
        const slot = this.slots.find(s => s.id === slotId);

        if (slot) {
          slot.owner = formData.get('name');
          slot.contact = formData.get('contact');
          slot.startDate = formData.get('startDate');
          slot.status = 'active';
          slot.paymentStatus = 'pending';

          this.saveSlots();
          this.calculateRevenue();
          this.renderMembers();
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new BillingManager();
    });
  </script>
</body>
</html>
